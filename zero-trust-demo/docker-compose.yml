# Zero-Trust Security Architecture Demo
# This demonstrates: Identity, Secrets, API Gateway, Policy Engine, mTLS, Monitoring

networks:
  # Network Segmentation - Core Zero Trust Principle
  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  internal:
    driver: bridge
    internal: true  # No external access
    ipam:
      config:
        - subnet: 172.21.0.0/24
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
  data:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/24

volumes:
  postgres_data:
  vault_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  kong_data:

services:
  # ============================================
  # IDENTITY LAYER - Keycloak (Identity Provider)
  # ============================================
  postgres-keycloak:
    image: postgres:15-alpine
    container_name: zt-postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: zt-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    ports:
      - "8080:8080"
    volumes:
      - ./identity/realm-config:/opt/keycloak/data/import
    networks:
      - dmz
      - data
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # SECRETS MANAGEMENT - HashiCorp Vault
  # ============================================
  vault:
    image: hashicorp/vault:1.15
    container_name: zt-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
      - ./secrets/vault-config:/vault/config
      - ./secrets/policies:/vault/policies
    networks:
      - dmz
      - internal
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API GATEWAY - Kong with OIDC
  # ============================================
  postgres-kong:
    image: postgres:15-alpine
    container_name: zt-postgres-kong
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${POSTGRES_KONG_PASSWORD}
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:3.5
    container_name: zt-kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres-kong
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${POSTGRES_KONG_PASSWORD}
    networks:
      - data
    depends_on:
      postgres-kong:
        condition: service_healthy

  kong:
    image: kong:3.5
    container_name: zt-kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres-kong
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${POSTGRES_KONG_PASSWORD}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_PLUGINS: bundled
    ports:
      - "8000:8000"   # Proxy
      - "8443:8443"   # Proxy SSL
      - "8001:8001"   # Admin API
    networks:
      - dmz
      - internal
      - data
    depends_on:
      - kong-migrations
      - keycloak
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # POLICY ENGINE - Open Policy Agent
  # ============================================
  opa:
    image: openpolicyagent/opa:latest-rootless
    container_name: zt-opa
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "--set=decision_logs.console=true"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./policy-engine/policies:/policies
    networks:
      - internal
      - dmz
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SAMPLE MICROSERVICES
  # ============================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: zt-auth-service
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_DEV_ROOT_TOKEN}
      - OPA_URL=http://opa:8181
      - SERVICE_NAME=auth-service
    networks:
      - internal
    depends_on:
      - keycloak
      - vault
      - opa
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-service:
    build:
      context: ./services/backend-service
      dockerfile: Dockerfile
    container_name: zt-backend-service
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_DEV_ROOT_TOKEN}
      - OPA_URL=http://opa:8181
      - SERVICE_NAME=backend-service
      - DATABASE_URL=postgresql://app:${POSTGRES_APP_PASSWORD}@postgres-app:5432/appdb
    networks:
      - internal
      - data
    depends_on:
      - vault
      - opa
      - postgres-app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: zt-frontend
    environment:
      - KEYCLOAK_URL=http://localhost:8080
      - API_GATEWAY_URL=http://localhost:8000
    ports:
      - "3000:80"
    networks:
      - dmz
    depends_on:
      - kong

  postgres-app:
    image: postgres:15-alpine
    container_name: zt-postgres-app
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD}
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MONITORING STACK
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: zt-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.0
    container_name: zt-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus

  # Elasticsearch for security logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: zt-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: zt-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - monitoring
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ============================================
  # CERTIFICATE AUTHORITY (for mTLS demo)
  # ============================================
  step-ca:
    image: smallstep/step-ca:0.25.0
    container_name: zt-step-ca
    volumes:
      - ./certs/step:/home/step
    environment:
      - DOCKER_STEPCA_INIT_NAME=Zero-Trust-CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,localhost
      - DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT=true
      - DOCKER_STEPCA_INIT_PASSWORD=${STEP_CA_PASSWORD}
    ports:
      - "9000:9000"
    networks:
      - internal
      - dmz
