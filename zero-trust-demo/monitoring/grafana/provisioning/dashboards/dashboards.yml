# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'Zero-Trust Dashboards'
    orgId: 1
    folder: 'Zero Trust'
    folderUid: 'zero-trust'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
